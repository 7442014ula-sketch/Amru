<!DOCTYPE html>

<html>

<head>
    <title>MY ICE CREAM SHOP</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background: white;
            color:rgb(68, 68, 59);
            text-align: center;
        }

        h1 {
            color:rgb(241, 168, 79);
        }

        h1+p {
            background:white;
            padding: 10px;
            border-radius: 30px;
            color:rgb(114, 106, 106);
            text-decoration: underline;
        }

        ul {
            padding: 0;
            margin-top: 20px;
        }

        ul>li {
            list-style-type: none;
            padding: 10px;
            margin: 5px;
            background: rgb(241, 168, 79);
            color: white;
            border-radius: 5px;
        }

        ul li:nth-child(3) {
            font-size: 20px;
            font-weight: bold;
            color:yellow;
        }

        .message {
            color:rgb(12, 223, 65);
            margin-top: 20px;
            font-size: 16px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .links {
            margin-top: 20px;
        }

        .links a {
            display: inline-block;
            margin: 0 10px;
            padding: 10px 20px;
            background: rgb(241, 168, 79);
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover {
            background: rgb(197, 147, 86);
        }
    </style>
</head>

<body>
    <h1>ISLAND SCOOPS</h1>
    <p>Welcome to our island scoops! We offer a variety of delicious flavors to satisfy your sweet tooth.</p>
    <ul>

    </div>

</html>

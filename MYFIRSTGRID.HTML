<!DOCTYPE html>

<html>

<head>
    <title>My hobby cards</title>

    <link rel="stylesheet" href=" https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <style>
         body {
            background-color:burlywood;
            font-family: Arial, Helvetica, sans-serif;
            padding: 30px;
         }

         h2 {
            text-align: center;
            color:greenyellow;
         }

         h3 {
            color: rgb(174, 18, 189);
         }

         .hobby-cards {
            text-align: center;
            border: 7px solid orangered;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            background-color: rgb(48, 119, 182);
         }

         .hobby-cards:hover {
            background: rgb(8, 212, 178);
         }
         
    </style>

</head>

<body>
    
    <h2>MY HOBBY CARDS</h2>

    <div class="container">

      <div class="row">
        <div class="col-12 col-md-6 col-lg-4">
           <div class="hobby-cards">
                <h3>Badminton</h3>
                <p>i love playing badminton</p>
           </div>
        </div>

    <div class="col-12 col-mg-6 col-lg-4">
        <div class="hobby-cards">
                <h3>football</h3>
                <p>i play football as well as badminton</p>
        </div>
    </div>

    <div class="col-12 col-mg-6 col-lg-4">
        <div class="hobby-cards">
               <h3>volley</h3>
               <p>Volley is my 3rd favourite sport after badminton and football</p>
        </div>
      </div>
    </div>


</body>

</html>

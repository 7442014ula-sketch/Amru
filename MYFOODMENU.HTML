<!DOCTYPE html>

<html>

<head>
    <title>My Food Menu</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: white;
            color:rgb(61, 61, 59);
            text-align: center;
        }

        h1 {
            color:rgb(250, 172, 77)
        }

        h1+p {
            background:white;
            padding: 10px;
            border-radius: 30px;
            color:salmon;
            text-decoration: underline;
        }

        ul {
            padding: 0;
            margin-top: 20px;
        }

        ul>li {
            list-style-type: none;
            padding: 10px;
            margin: 5px;
            background: rgb(250, 172, 77);
            color: white;
            border-radius: 5px;
        }

        ul li:nth-child(3) {
            font-size: 20px;
            font-weight: bold;
            color:yellow;
        }

        .desc {
            color:rgb(82, 79, 79);
            margin-top: 20px;
            font-size: 16px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .desc::first-letter {
            font-size: 220%;
            color: orangered;
            font-weight: bold;
        }

        .links {
            margin-top: 20px;
        }

        a {
            color:orangered;
            text-decoration: none;
            font-size: 16px;
            margin: 10px;
            padding: 10px;
            border: 2px solid orangered;
            border-radius: 5px;
        }

        a:hover {
            background: orangered;
            color: white;
        }
</style>
</head>

<body>
    <h1>My Food Menu</h1>
    <p>pick your favourite dish and enjoy!👌</p>

    <ul>
        <li>Spaghetti</li>
        <li>salad</li>
        <li>Butter chicken-chefs special</li>
        <li>pizza</li>
        <li>lamb kebab</li>
    </ul>

    <p class="desc">Delicious and satisfying meals prepared with the finest ingredients.</p>

    <div class="links">
        <a href="#">order now</a>
        <a href="#">see more</a>
    </div>
</body>

</html>

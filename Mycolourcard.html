<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Colour Card</title>

<style>
/* selector applies to all elements */
*{
    font-size: 16px;
}

/* element selectors */
body { 
    background-color: rgb(91, 96, 141);
}

h1 {
    color: rgb(62, 153, 62);
}

h2 {
    color: rgb(46, 190, 41);
}

p {
    color: rgb(139, 129, 36);
}

/* class selector */
.my.detail {
    color: rgb(163, 154, 74);
    font-weight: bold;

/* id selector */
#my-card {
    background-color: rgb(129, 196, 127);
}

</style>
</head>

<body>
    <h1>My colour card</h1>
    <p style="color: rgb(253, 7, 40);">This is my very own webpage</p>

<div id="my-card">
    <h2>Some things about myself </h2>
    <p class="my detail">my name is amru</p>
    <p class="my detail">I am 14 years old</p>
    <p class="my detail">I live in maldives</p>
    <p class="my detail">I love playing badminton</p>
</div>

<div id="my-house">
    <h2>My favourite things to do </h2>
    <p>Play badminton</p>
    <p>Play football</p>
    <p>play volleyball</p>
    <p>play fortnite</p>
</div>

</body>
</html>

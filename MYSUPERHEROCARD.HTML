<!DOCTYPE html>

<html>

<head>
    <Title>My Superhero Card</Title>
    <style>

        body {
            background-color: skyblue;
            color: rgb(228, 215, 33);
            font-family: Arial, sans-serif;
        }

        .hero-name {
            font-weight: bold;
            color:rgb(185, 197, 23)
            text-shadow orangered;
        }

        .tagline {
            font-style: italic;
            color:rgb(231, 144, 38);
            text-transform:capitalize
            text-align; center:
        }

        .label {
            font-size: 24px;
            font-weight: bold;
            color: rgb(38, 153, 199);
            text-decoration: underline;
        }

        .power {
            font-weight: bold;
            color: rgb(233, 15, 33);
        }

        .weakness {
            font-style: italic;
            color: rgb(31, 199, 25);
            text-decoration:underline;
            rotate: 10deg;
        }

        .hero-title {
            font-size: 20px;
            font-weight: bold;
            color: rgb(199, 31, 25);
            text-align: center;
        }

        .footer {
            font-size: 14px;
            color: rgb(120, 77, 221);
            text-align: center;
        }
    </style>
</head>

<body>

    <h1 class="hero-name">Electro Man</h1>
    <p class="tagline">The most powerful hero in the world</p>

    <h2 class="label">Superpowers</h2>
    <p class="power">Electricity manipulation</p>
    <p class="power">Super speed</p>
    <p class="power">Enhanced durability</p>

    <h2 class="label">Weaknesses</h2>
    <p class="weakness">Susceptible to water damage</p>
    <p class="weakness">Emp devices:💧</p>

    <h2 class="hero-title">Worlds ultimate warrior </h2>

    <p class="footer">Created by: Yours truly, Amru👌</p>
</body>
</html>
